name: Build and Test API-Server
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'modules/back-end/**'
      - '.github/build-and-test-api.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'modules/back-end/**'
      - '.github/build-and-test-api.yml'

jobs:
  validate:
    name: build-and-test-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/back-end
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore

      - name: Build Solution
        run: dotnet build -c Release --no-restore

      - name: Run Tests
        run: dotnet test -c Release --no-build --verbosity normal

        
      # Snyk Open Source Scan (SCA) 
      - name: 🧩 Snyk Open Source (SCA)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: 9d24edfd-d10d-48b6-9bc6-c6df4389218d
        with:
          args: test --all-projects --severity-threshold=high
                monitor --all-projects    

